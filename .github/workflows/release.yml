name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux-x86_64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout probe-gui
        uses: actions/checkout@v4
        with:
          path: probe-gui

      - name: Checkout probe-rs
        uses: actions/checkout@v4
        with:
          repository: probe-rs/probe-rs
          path: probe-rs

      - name: Checkout brtt
        uses: actions/checkout@v4
        with:
          repository: michal4132/brtt
          path: brtt

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libusb-1.0-0-dev \
            libudev-dev \
            pkg-config

      - name: Install frontend dependencies
        working-directory: probe-gui
        run: npm ci

      - name: Build Tauri app
        working-directory: probe-gui
        run: npx tauri build

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: probe-gui-${{ matrix.label }}
          path: |
            probe-gui/src-tauri/target/release/bundle/dmg/*.dmg
            probe-gui/src-tauri/target/release/bundle/macos/*.app

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: probe-gui-${{ matrix.label }}
          path: |
            probe-gui/src-tauri/target/release/bundle/deb/*.deb
            probe-gui/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: probe-gui-${{ matrix.label }}
          path: |
            probe-gui/src-tauri/target/release/bundle/nsis/*.exe
            probe-gui/src-tauri/target/release/probe-gui.exe

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
